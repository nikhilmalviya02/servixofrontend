<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="ServexaGo is a modern local service platform to book trusted professionals like plumbers, electricians, cleaners and more. Fast, secure and reliable."
    />

    <meta name="theme-color" content="#6366f1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <title>ServexaGo | Book Trusted Services Easily</title>

    <script>
      (function () {
        const theme = localStorage.getItem("theme");
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>

    <style>
      body {
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        margin: 0;
        background: #f9fafb;
      }

      #root {
        min-height: 100vh;
      }
    </style>
  </head>

  <body>
    <noscript>
      <div
        style="padding: 20px; text-align: center; font-family: sans-serif"
      >
        You need to enable JavaScript to run this app.
      </div>
    </noscript>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
